    n: Garden-NO_Potion-NO_key
    e: Library-NO_Potion-NO_key
  Garden-NO_Potion-NO_key:
    s: Workshop-NO_Potion-NO_key
    w: Hell-NO_Potion

    
  # NO Potion and YES key
  Entrance-NO_Potion-YES_key:
    n: Library-NO_Potion-YES_key
    w: Lab-NO_Potion-YES_key
  Lab-NO_Potion-YES_key:
