# DFA SCRIPT!

alphabet:
  - n
  - s
  - e
  - w
  - pick

states:
  - Start

  - Entrance-NO_Potion-NO_key
  - Lab-NO_Potion-NO_key
  - Library-NO_Potion-NO_key
  - Workshop-NO_Potion-NO_key
  - Garden-NO_Potion-NO_key
  # - Hell-NO_Potion-NO_key

  
  - Entrance-NO_Potion-YES_key
  - Lab-NO_Potion-YES_key
  - Library-NO_Potion-YES_key
  - Workshop-NO_Potion-YES_key
  - Garden-NO_Potion-YES_key
